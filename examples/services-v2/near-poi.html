<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Near POI Search v2 — BeMap JS API</title>
    <link rel="stylesheet" type="text/css" href="../../dist/ol.css">
    <link rel="stylesheet" type="text/css" href="../../dist/leaflet.css">
    <link rel="stylesheet" type="text/css" href="../../dist/maplibre-gl.css">
    <link rel="stylesheet" type="text/css" href="../../dist/bemap-js-api.css">
    <link rel="stylesheet" type="text/css" href="_shell.css">

    <script src="../../dist/ol.js"></script>
    <script src="../../dist/leaflet.js"></script>
    <script src="../../dist/maplibre-gl.js"></script>
    <script src="../../dist/pmtiles.js"></script>
    <script src="../../dist/bemap-js-api.js"></script>
    <script src="../context.js"></script>
    <script src="../bemap-provider.js"></script>
    <script src="_snippet.js"></script>
</head>
<body>
    <div id="map1"></div>

    <div class="panel-v2">
        <h4>Near POI Search <span class="v2-badge">v2</span></h4>
        <p style="margin:0 0 8px 0;color:#555;font-size:11px;">
            Click anywhere on the map →
            <code>bemap.NearPoiSearch.nearPoi(coord, filters)</code>
            returns the POIs closest to the clicked point.
        </p>

        <div class="field-row">
            <div style="flex:1;">
                <label>Distance (m)</label>
                <input id="np-distance" type="number" value="800" min="50" max="20000">
            </div>
            <div style="flex:1;">
                <label>Transport</label>
                <select id="np-mode">
                    <option value="CAR">CAR</option>
                    <option value="PEDESTRIAN">PEDESTRIAN</option>
                    <option value="BICYCLE">BICYCLE</option>
                    <option value="TRUCK">TRUCK</option>
                </select>
            </div>
        </div>
        <div class="field-row" style="margin-top:6px;">
            <div style="flex:1;">
                <label>Order by</label>
                <select id="np-order">
                    <option value="">(none)</option>
                    <option value="DISTANCE_ASC">DISTANCE_ASC</option>
                    <option value="DISTANCE_DESC">DISTANCE_DESC</option>
                    <option value="DURATION_ASC">DURATION_ASC</option>
                    <option value="DURATION_DESC">DURATION_DESC</option>
                </select>
            </div>
            <div style="flex:1;">
                <label><input id="np-polyline" type="checkbox"> Include polyline</label>
            </div>
        </div>

        <div id="np-status" class="status">Click anywhere on the map to search.</div>
        <ul id="np-results" class="result-list"></ul>
    </div>

    <script src="near-poi.js"></script>
</body>
</html>
