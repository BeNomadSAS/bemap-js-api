<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EV Smart Routing v2 — BeMap JS API</title>
    <link rel="stylesheet" type="text/css" href="../../dist/ol.css">
    <link rel="stylesheet" type="text/css" href="../../dist/leaflet.css">
    <link rel="stylesheet" type="text/css" href="../../dist/maplibre-gl.css">
    <link rel="stylesheet" type="text/css" href="../../dist/bemap-js-api.css">
    <link rel="stylesheet" type="text/css" href="_shell.css">

    <script src="../../dist/ol.js"></script>
    <script src="../../dist/leaflet.js"></script>
    <script src="../../dist/maplibre-gl.js"></script>
    <script src="../../dist/pmtiles.js"></script>
    <script src="../../dist/bemap-js-api.js"></script>
    <script src="../context.js"></script>
    <script src="../bemap-provider.js"></script>
    <script src="_snippet.js"></script>
</head>
<body>
    <div id="map1"></div>

    <div class="panel-v2" style="max-width:400px;">
        <h4>EV Smart Routing <span class="v2-badge">v2</span></h4>
        <p style="margin:0 0 8px 0;color:#555;font-size:11px;">
            Drop a start and a stop on the map →
            <code>bemap.EvSmartRouting.calculate(req)</code>
            plans the journey with the configured EV and CSP.
        </p>

        <div class="field-row">
            <div style="flex:1;">
                <label>Brand</label>
                <select id="ev-brand"><option>Loading…</option></select>
            </div>
            <div style="flex:2;">
                <label>Vehicle</label>
                <select id="ev-vehicle-sel"><option>Pick a brand first…</option></select>
            </div>
        </div>
        <div class="field-row" id="ev-vehicle-fallback" style="display:none;">
            <div style="flex:1;">
                <label>Vehicle key (no brands in ACL — paste a UUID)</label>
                <input id="ev-vehicle" type="text" placeholder="UUID from the EV catalogue">
            </div>
        </div>
        <div class="field-row">
            <div style="flex:1;">
                <label>Init battery %</label>
                <input id="ev-init" type="number" value="80" min="0" max="100">
            </div>
            <div style="flex:1;">
                <label>Min %</label>
                <input id="ev-min" type="number" value="10" min="0" max="100">
            </div>
            <div style="flex:1;">
                <label>Min arrival %</label>
                <input id="ev-arrival" type="number" value="20" min="0" max="100">
            </div>
        </div>
        <div class="field-row">
            <div style="flex:1;">
                <label>Temperature (°C)</label>
                <input id="ev-temp" type="number" value="18">
            </div>
            <div style="flex:1;">
                <label>Payload (kg)</label>
                <input id="ev-payload" type="number" value="75">
            </div>
        </div>
        <div class="field-row">
            <button id="ev-go">Calculate</button>
            <button id="ev-clear" class="secondary">Clear</button>
        </div>

        <div id="ev-status" class="status">Click the map to drop the start point.</div>
        <div id="ev-summary" class="status"></div>
        <ul id="ev-steps" class="result-list"></ul>
    </div>

    <script src="ev-smart-routing.js"></script>
</body>
</html>
