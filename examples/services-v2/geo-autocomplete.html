<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GeoAutocomplete v2 — BeMap JS API</title>
    <link rel="stylesheet" type="text/css" href="../../dist/ol.css">
    <link rel="stylesheet" type="text/css" href="../../dist/leaflet.css">
    <link rel="stylesheet" type="text/css" href="../../dist/maplibre-gl.css">
    <link rel="stylesheet" type="text/css" href="../../dist/bemap-js-api.css">
    <link rel="stylesheet" type="text/css" href="_shell.css">

    <script src="../../dist/ol.js"></script>
    <script src="../../dist/leaflet.js"></script>
    <script src="../../dist/maplibre-gl.js"></script>
    <script src="../../dist/pmtiles.js"></script>
    <script src="../../dist/bemap-js-api.js"></script>
    <script src="../context.js"></script>
    <script src="../bemap-provider.js"></script>
    <script src="_snippet.js"></script>
</head>
<body>
    <div id="map1"></div>

    <div class="panel-v2">
        <h4>GeoAutocomplete <span class="v2-badge">v2</span></h4>
        <p style="margin:0 0 8px 0;color:#555;font-size:11px;">
            Same endpoint as Autocomplete but forces
            <code>addressDetails: true</code> — every result returns with
            a structured <code>PostalAddress</code> + coordinate.
        </p>

        <div>
            <label>Type a place</label>
            <input id="ga-input" type="text" placeholder="e.g. 100 rue de Rivoli" autocomplete="off">
        </div>

        <div id="ga-status" class="status">Ready.</div>
        <ul id="ga-results" class="result-list"></ul>
    </div>

    <script src="geo-autocomplete.js"></script>
</body>
</html>
