<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EV Vehicles v2 — BeMap JS API</title>
    <link rel="stylesheet" type="text/css" href="../../dist/ol.css">
    <link rel="stylesheet" type="text/css" href="../../dist/leaflet.css">
    <link rel="stylesheet" type="text/css" href="../../dist/maplibre-gl.css">
    <link rel="stylesheet" type="text/css" href="../../dist/bemap-js-api.css">
    <link rel="stylesheet" type="text/css" href="_shell.css">

    <script src="../../dist/ol.js"></script>
    <script src="../../dist/leaflet.js"></script>
    <script src="../../dist/maplibre-gl.js"></script>
    <script src="../../dist/pmtiles.js"></script>
    <script src="../../dist/bemap-js-api.js"></script>
    <script src="../context.js"></script>
    <script src="../bemap-provider.js"></script>
    <script src="_snippet.js"></script>
</head>
<body>
    <div id="map1"></div>

    <div class="panel-v2" style="max-width:420px;">
        <h4>EV Vehicles <span class="v2-badge">v2</span></h4>
        <p style="margin:0 0 8px 0;color:#555;font-size:11px;">
            Catalogue browser via
            <code>bemap.EvVehicles</code>
            — uses the v1.1 vehicle endpoint that returns structured
            plaintext fields (battery, DC/AC power, dimensions, WLTP).
        </p>

        <div class="field-row">
            <div style="flex:1;">
                <label>Brand</label>
                <select id="ev-brand"><option>Loading…</option></select>
            </div>
            <div style="flex:2;">
                <label>Search</label>
                <input id="ev-search" type="text" placeholder="model / variant / year">
            </div>
        </div>

        <div id="ev-status" class="status">Pick a brand to load vehicles.</div>
        <ul id="ev-list" class="result-list"></ul>

        <div id="ev-spec" style="margin-top:8px;padding:8px;background:#f4ecf7;border-radius:3px;font-size:12px;display:none;">
            <strong id="ev-spec-name"></strong>
            <div id="ev-spec-body" style="margin-top:4px;color:#444;line-height:1.4;"></div>
            <button id="ev-spec-route" style="margin-top:6px;">Plan a route with this vehicle →</button>
        </div>
    </div>

    <script src="ev-vehicles.js"></script>
</body>
</html>
