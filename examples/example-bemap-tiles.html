<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BeMap JS API — BeNomad Tiles default</title>

  <link rel="stylesheet" href="../dist/maplibre-gl.css">
  <link rel="stylesheet" href="bn-2026.css">

  <script src="../dist/maplibre-gl.js"></script>
  <script src="../dist/pmtiles.js"></script>
  <script src="../dist/bemap-js-api.js"></script>
  <script src="effect-bridge.js"></script>
  <script src="context.js"></script>
  <script src="bn-2026.js"></script>
</head>
<body data-bn-page
      data-bn-title="BeNomad Tiles — default style"
      data-bn-subtitle="One <code>tilesHost</code> on the Context, instantiate <code>bemap.MapLibreMap</code> — login, JWT, fetch interceptor and tile cache are handled by the library."
      data-bn-chips="MapLibre:ml,v2.0:brand">
  <div class="bn-shell">
    <div class="bn-stage">
      <div id="map" class="bn-map"></div>
    </div>
  </div>

<script>
// BeNomad Tiles v2.0 minimal setup. bemapMainCtx is loaded by the dashboard's
// context.js; we reuse the credentials and add tilesHost on top — this is the
// canonical "migrate from WMS to BeNomad Tiles" customer code.
var ctx = new bemap.Context({
  host:      bemapMainCtx.host,
  secure:    bemapMainCtx.protocol === 'https',
  login:     bemapMainCtx.login,
  password:  bemapMainCtx.password,
  tilesHost: 'mptiles-api-beta.benomad.net'
});

var map = new bemap.MapLibreMap(ctx, 'map', { zoom: 5 });
map.move(2.35, 48.85, 5);

bn.log('Constructed bemap.MapLibreMap with tilesHost=' + ctx.tilesHost, 'info');

if (typeof map._onError === 'function') {
  map._onError('error', function (err) {
    bn.log('Error ' + err.code + ' (' + (err.status || 'n/a') + '): ' + (err.message || ''), 'err');
  });
}

bn.onMapReady(map, function () {
  bn.log('Map ready — bundled BeNomad gray-level style loaded.', 'ok');
  if (typeof map.isTokenValid === 'function') {
    bn.log('JWT token: ' + (map.isTokenValid() ? 'valid' : 'pending') + ' — watch Network for /OSM_*.pmtiles range requests.', 'info');
  }
});
</script>
</body>
</html>
