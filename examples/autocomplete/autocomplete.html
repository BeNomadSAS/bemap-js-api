  <link rel="stylesheet" href="../../dist/ol.css" type="text/css">

  <style media="screen">
    #map1 {
      position: fixed;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      transition: all .4s;
    }

    .inputBlock {
      margin-top: 10px;

  <div id="map1"></div>
  <div class="inputBlock form-horizontal">
    <div class="row has-feedback">
      <div class="col-md-1">
        <span class="fas fa-home icon-destination"></span>
      </div>
      <div class="col-md-10">
        <input type="search" id="autoInput" class="form-control"><span class="glyphicon form-control-feedback"></span>
      </div>
    </div>
    <div class="row has-feedback">

      </div>

      </div>
    </div>

      </div>
      <div class="col-md-10">
        <input type="search" id="autoInput2" class="form-control"><span class="glyphicon form-control-feedback"></span>
      </div>
    </div>
