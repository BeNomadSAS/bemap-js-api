<body onload="onLoaded();" style="margin:0;padding:0;">
  <div id="pageHeader" style="padding:10px;background:#f5f5f5;border-bottom:1px solid #ddd;">
      <h3 style="margin-top:0;">Leaflet Map with Clustering &amp; Shapes</h3>
      <p style="margin:0;color:#555;">LeafletMap backend with marker clustering, polylines, polygons, circles, popups, and draggable objects. Click any shape to see a popup. Drag the circle to move it.</p>
  </div>
  <div id="map1"></div>
  <script>
    // Hide this page's own header when embedded in the BeMap 2026 dashboard
    // iframe — the dashboard top bar already shows the title.
    try {
      if (window.parent !== window) {
        var h = document.getElementById('pageHeader');
        if (h) h.style.display = 'none';
        var m = document.getElementById('map1');
        if (m) m.style.height = '100vh';
      }
    } catch (e) {}
  </script>
