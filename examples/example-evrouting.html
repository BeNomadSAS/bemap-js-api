<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BeNomad BeMap JavaScript API</title>
    <link rel="stylesheet" href="../lib/bootstrap/dist/css/bootstrap.min.css" type="text/css">
    <link rel="stylesheet" href="../dist/ol.css" type="text/css">
    <script language="JavaScript" src="../dist/ol.js"></script>
    <script language="JavaScript" src="../dist/leaflet.js"></script>
  <script language="JavaScript" src="../dist/leaflet.markercluster.js"></script>
  <script language="JavaScript" src="../dist/maplibre-gl.js"></script>
  <script src="../dist/pmtiles.js"></script>
  <link rel="stylesheet" href="../dist/maplibre-gl.css" type="text/css">
  <link rel="stylesheet" href="../dist/leaflet.css" type="text/css">
  <script language="JavaScript" src="../dist/bemap-js-api.js"></script>
    <link rel="stylesheet" type="text/css" href="../dist/bemap-js-api.css" media="screen">
	<script language="JavaScript" src="context.js"></script>
  <script language="JavaScript" src="bemap-provider.js"></script>
    <script language="JavaScript" src="example-evrouting.js"></script>
	<style>
#map1 {
	height : 450px;
}
	</style>
</head>

<body onload="onLoaded();">
    <div style="padding:10px;background:#f5f5f5;border-bottom:1px solid #ddd;">
        <h3 style="margin-top:0;">EV Routing &amp; Isochrone</h3>
        <p style="margin:5px 0;color:#555;">Computes an EV smart route from <strong>Paris</strong> to <strong>Lyon</strong> with charging station stops (Renault Zoe profile, 100% initial battery, 20°C).</p>
        <button class="btn btn-primary btn-sm" onclick="sample.runEvseRouting(sample.map);">EV Route (Paris → Lyon)</button>
        <button class="btn btn-info btn-sm" onclick="sample.runRouting(sample.map);">Standard Route (BeNomad → Antibes)</button>
        <button class="btn btn-warning btn-sm" onclick="sample.runIsochrone(sample.map);">Isochrone (from BeNomad)</button>
        <button class="btn btn-default btn-sm" onclick="sample.runGeocoding(sample.map);">Geocoding test</button>
        <br/><span style="color:#888;font-size:0.85em;">Click any button to run the corresponding demo. Check console for detailed output.</span>
    </div>
    <div id="map1" style="height:calc(100vh - 110px);"></div>
</body>

</html>
