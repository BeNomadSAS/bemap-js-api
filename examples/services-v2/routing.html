<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Routing v2 — BeMap JS API</title>
    <link rel="stylesheet" type="text/css" href="../../dist/ol.css">
    <link rel="stylesheet" type="text/css" href="../../dist/leaflet.css">
    <link rel="stylesheet" type="text/css" href="../../dist/maplibre-gl.css">
    <link rel="stylesheet" type="text/css" href="../../dist/bemap-js-api.css">
    <link rel="stylesheet" type="text/css" href="_shell.css">

    <script src="../../dist/ol.js"></script>
    <script src="../../dist/leaflet.js"></script>
    <script src="../../dist/maplibre-gl.js"></script>
    <script src="../../dist/pmtiles.js"></script>
    <script src="../../dist/bemap-js-api.js"></script>
    <script src="../context.js"></script>
    <script src="../bemap-provider.js"></script>
    <script src="_snippet.js"></script>
</head>
<body>
    <div id="map1"></div>

    <div class="panel-v2">
        <h4>Routing <span class="v2-badge">v2</span></h4>
        <p style="margin:0 0 8px 0;color:#555;font-size:11px;">
            Click the map to drop start / end / vias.
            <code>bemap.RoutingV2.calculate(...)</code> returns a Promise
            that resolves with a <code>RoutingResponse</code>.
        </p>

        <div class="field-row">
            <div style="flex:1;">
                <label>Optimisation</label>
                <select id="rt-crit">
                    <option value="FASTEST">FASTEST</option>
                    <option value="SHORTEST">SHORTEST</option>
                    <option value="ECO_ENERGY">ECO_ENERGY</option>
                </select>
            </div>
            <div style="flex:1;">
                <label>Transport</label>
                <select id="rt-veh">
                    <option value="">(default — CAR)</option>
                    <option value="CAR">CAR</option>
                    <option value="TRUCK">TRUCK</option>
                    <option value="MOTORCYCLE">MOTORCYCLE</option>
                    <option value="BICYCLE">BICYCLE</option>
                    <option value="PEDESTRIAN">PEDESTRIAN</option>
                </select>
            </div>
        </div>
        <div>
            <label>
                <input id="rt-avoid-toll" type="checkbox"> avoid toll
            </label>
            <label>
                <input id="rt-avoid-hw" type="checkbox"> avoid highway
            </label>
        </div>

        <div style="margin-top:10px;display:flex;gap:6px;">
            <button id="rt-go">Calculate</button>
            <button id="rt-cancel" class="secondary">Cancel</button>
            <button id="rt-clear" class="secondary">Reset</button>
        </div>

        <div id="rt-status" class="status">Click the map to drop the start point.</div>
        <div id="rt-summary" style="margin-top:8px;font-size:12px;color:#2c3e50;"></div>
    </div>

    <script src="routing.js"></script>
</body>
</html>
