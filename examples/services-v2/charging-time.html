<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Charging Time v2 — BeMap JS API</title>
    <link rel="stylesheet" type="text/css" href="../../dist/ol.css">
    <link rel="stylesheet" type="text/css" href="../../dist/leaflet.css">
    <link rel="stylesheet" type="text/css" href="../../dist/maplibre-gl.css">
    <link rel="stylesheet" type="text/css" href="../../dist/bemap-js-api.css">
    <link rel="stylesheet" type="text/css" href="_shell.css">

    <script src="../../dist/ol.js"></script>
    <script src="../../dist/leaflet.js"></script>
    <script src="../../dist/maplibre-gl.js"></script>
    <script src="../../dist/pmtiles.js"></script>
    <script src="../../dist/bemap-js-api.js"></script>
    <script src="../context.js"></script>
    <script src="../bemap-provider.js"></script>
    <script src="_snippet.js"></script>
</head>
<body>
    <div id="map1"></div>

    <div class="panel-v2" style="max-width:420px;">
        <h4>Charging Time <span class="v2-badge">v2</span></h4>
        <p style="margin:0 0 8px 0;color:#555;font-size:11px;">
            Estimate the time to charge an EV from one battery level to
            another via
            <code>bemap.ChargingTime.estimate(req)</code>.
        </p>

        <div class="field-row">
            <div style="flex:1;">
                <label>Brand</label>
                <select id="ct-brand"><option>Loading…</option></select>
            </div>
            <div style="flex:2;">
                <label>Vehicle</label>
                <select id="ct-vehicle"><option>Pick a brand first…</option></select>
            </div>
        </div>

        <div class="field-row">
            <div style="flex:1;">
                <label>Charger (kW)</label>
                <input id="ct-power" type="number" value="22" min="1" max="400">
            </div>
            <div style="flex:1;">
                <label>Current</label>
                <select id="ct-current">
                    <option value="AC_THREE_PHASES" selected>AC_THREE_PHASES</option>
                    <option value="AC_SINGLE_PHASE">AC_SINGLE_PHASE</option>
                    <option value="DC">DC</option>
                </select>
            </div>
        </div>

        <div class="field-row">
            <div style="flex:1;">
                <label>From (%)</label>
                <input id="ct-from" type="number" value="20" min="0" max="99">
            </div>
            <div style="flex:1;">
                <label>To (%)</label>
                <input id="ct-to" type="number" value="80" min="1" max="100">
            </div>
            <div style="flex:1;">
                <label>Temp (°C)</label>
                <input id="ct-temp" type="number" value="20">
            </div>
        </div>

        <div class="field-row">
            <button id="ct-go">Estimate</button>
        </div>

        <div id="ct-status" class="status">Pick a brand &amp; vehicle to begin.</div>
        <div id="ct-result" class="status" style="margin-top:4px;"></div>
    </div>

    <script src="charging-time.js"></script>
</body>
</html>
